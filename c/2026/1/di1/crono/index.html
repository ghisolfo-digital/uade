<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cronograma</title>
  <link rel="stylesheet" href="estilos.css" />
  <script src="appjs.js" defer></script>
  <link rel="icon" href="/uade/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/uade/favicon.png" type="image/png">
  <link rel="shortcut icon" href="/uade/favicon.ico" type="image/x-icon">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <div class="header-top">
        <div class="title" id="header-title">Cronograma</div>
        <div class="meta" id="header-meta"></div>
        <div class="brand"><span class="pill" id="header-brand"></span></div>

        <nav class="header-switch" aria-label="Secciones">
          <a class="header-switch-item is-active" href="../crono/">Cronograma</a>
          <a class="header-switch-item" href="../links/">Links y materiales</a>
        </nav>
      </div>
      <div class="header-subline" id="header-subline">Cargando cronograma…</div>
    </div>
  </header>

  <main class="wrap main-wrap">
    <div id="status-message" class="status-card">Cargando cronograma…</div>
    <section id="schedule" class="schedule" aria-live="polite"></section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-left">
        <span class="footer-name">Alvaro G. Ghisolfo</span>
        <a class="slink" href="https://instagram.com/ghisolfo.digital" target="_blank" rel="noopener" aria-label="Instagram">
          <i class="ti ti-brand-instagram"></i>
        </a>
        <a class="slink" href="https://discord.gg/sxXRJxqCMV" target="_blank" rel="noopener" aria-label="Discord">
          <i class="ti ti-brand-discord"></i>
        </a>
        <a class="slink" href="https://ghisolfo.digital" target="_blank" rel="noopener" aria-label="Sitio web">
          <i class="ti ti-world"></i>
        </a>
      </div>
      <a class="footer-right" href="https://instagram.com/ghisolfo.digital" target="_blank" rel="noopener" aria-label="Instagram: @ghisolfo.digital">
        <i class="ti ti-brand-instagram"></i>
        <span class="footer-domain">ghisolfo.digital</span>
      </a>
    </div>
  </footer>
</body>
</html>
