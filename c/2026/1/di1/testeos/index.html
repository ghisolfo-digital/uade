<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Testeos UX</title>
<link rel="icon" href="./favicon.svg" type="image/svg+xml">
<link rel="icon" href="./favicon.png" type="image/png">
<link rel="shortcut icon" href="./favicon.ico">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kreon:wght@300..700&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <style>
    
:root {
  --bg: #f4f7f1;
  --text: #182018;
  --muted: #5f6f60;
  --card: #ffffff;
  --line: #dce5d8;

  --green: #2e7d32;
  --green-dark: #1b5e20;
  --green-header: #1f6c41;
  --green-soft: #e2f1df;
  --green-soft-2: #f0f7ed;
  --green-active: #cfe8cc;
  --green-selected: #d9ead3;

  --cream: #fbfcf8;
  --black: #0a0a0a;

  --header-bg: #1f6c41;
  --header-text: #f0f6f3;
  --header-text-dim: #d5e3dd;
  --header-stroke: rgba(255,255,255,.42);

  --radius: 16px;
  --shadow: 0 8px 22px rgba(25, 70, 32, .10);

  --footer-h: 38px;

  --ff-sans: "Lato", system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, "Helvetica Neue", Arial, sans-serif;
  --ff-kreon: "Kreon", system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, "Helvetica Neue", Arial, serif;
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  padding-bottom: var(--footer-h);
  font-family: var(--ff-sans);
  background: var(--bg);
  color: var(--text);
}

/* ================= HEADER ================= */

.site-header {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: var(--header-bg);
  border-bottom: 1px solid rgba(0,0,0,.18);
  box-shadow: 0 2px 8px rgba(0,0,0,.18);
}

.wrap,
main {
  width: min(980px, 100%);
  margin: 0 auto;
  padding: 0 16px;
}

.header-wrap {
  padding-top: 14px;
  padding-bottom: 14px;
}

.header-top {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: center;
  gap: 10px;
}

.header-main {
  min-width: 0;
}

.site-header .title {
  font-family: var(--ff-kreon);
  font-size: 1.65rem;
  line-height: 1.02;
  font-weight: 700;
  color: var(--header-text);
}

.site-header .meta {
  margin-top: 2px;
  font-size: .88rem;
  line-height: 1.25;
  color: var(--header-text-dim);
}

.site-header .brand .pill {
  display: inline-flex;
  align-items: center;
  border: 1px solid var(--header-stroke);
  border-radius: 999px;
  padding: 5px 10px;
  color: var(--header-text);
  background: rgba(255,255,255,.12);
  font-size: .78rem;
  font-weight: 700;
  white-space: nowrap;
}

@media (max-width: 640px) {
  .header-top {
    grid-template-columns: 1fr;
    align-items: start;
  }

  .site-header .title {
    font-size: 1.45rem;
  }

  .site-header .brand .pill {
    font-size: .72rem;
    padding: 4px 9px;
  }
}

/* ================= BASE ================= */

main {
  padding-top: 16px;
  padding-bottom: 24px;
}

section {
  margin: 18px 0;
}

main > section > h2 {
  margin-top: 30px;
}

main > section:first-child > h2 {
  margin-top: 0;
}

h2 {
  font-family: var(--ff-kreon);
  font-size: 1.35rem;
  line-height: 1.1;
  margin: 0 0 10px;
  font-weight: 700;
}

h3 {
  font-family: var(--ff-kreon);
  font-size: 1.12rem;
  line-height: 1.1;
  margin: 0 0 9px;
  font-weight: 700;
}

.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 14px;
  border: 1px solid rgba(31, 108, 65, .10);
}

.selector-card {
  display: grid;
  gap: 10px;
  background: var(--cream);
}

label {
  font-weight: 700;
  font-size: .9rem;
}

select,
button,
a.button {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 11px 13px;
  font: inherit;
  background: white;
  color: var(--text);
}

button,
a.button {
  cursor: pointer;
  text-align: center;
  text-decoration: none;
  font-weight: 700;
}

.button-primary {
  background: var(--green-dark);
  border-color: var(--green-dark);
  color: white;
}

.button-primary:hover {
  background: #154f1a;
}

.button-row {
  display: grid;
  gap: 9px;
  grid-template-columns: 1fr;
}

/* ================= TITULOS ================= */

.section-title-row {
  display: flex;
  align-items: baseline;
  gap: .45em;
  margin-top: 30px;
}

.section-title-clock {
  display: inline-flex;
  align-items: baseline;
  gap: .45em;
  margin-left: .45em;
  font-size: inherit;
  font-weight: inherit;
  color: var(--muted);
  white-space: nowrap;
}

/* ================= STATUS ACTUAL ================= */

.status-grid,
.tables {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
}

.status-card {
  border-left: 7px solid var(--green-dark);
  background: white;
}

.status-card.current-for-team {
  background: var(--green-soft);
}

.aula-code {
  text-transform: none;
}

.eyebrow {
  font-size: .78rem;
  line-height: 1.15;
  letter-spacing: 0;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 6px;
}

.status-card .eyebrow {
  font-size: 1rem;
  margin-bottom: 8px;
}

.block-hour {
  font-weight: 800;
}

.block-lower {
  text-transform: none;
  font-weight: 500;
}

.big {
  font-size: 1.12rem;
  font-weight: 800;
  line-height: 1.15;
}

.sub {
  color: var(--muted);
  margin-top: 4px;
  font-size: .93rem;
}

.status-card .sub {
  margin-top: 11px;
  margin-bottom: 6px;
}

.now-testing-line {
  display: flex;
  align-items: baseline;
  gap: 7px;
  line-height: 1.15;
}

.now-testing-label {
  font-size: .9rem;
  font-weight: 500;
  color: var(--muted);
}

.now-testing-team {
  font-weight: 800;
}

.team-main {
  font-weight: 800;
  line-height: 1.12;
}

.team-topic {
  display: block;
  margin-top: 3px;
  font-size: .78rem;
  line-height: 1.18;
  color: var(--muted);
  font-weight: 400;
}

.team-label-large .team-main {
  font-size: 1.06rem;
}

.team-label-large .team-topic {
  font-size: .82rem;
}

.feedback-list {
  margin-top: 0;
  display: grid;
  gap: 6px;
}

.pill {
  display: inline-flex;
  flex-direction: column;
  align-items: flex-start;
  border-radius: 12px;
  background: var(--green-soft-2);
  padding: 7px 10px;
  font-size: .88rem;
  font-weight: 700;
}

.pill.selected {
  background: var(--green-selected);
  outline: 2px solid var(--green-dark);
}

.feedback-pill-row {
  display: flex;
  align-items: baseline;
  gap: 7px;
}

.feedback-emoji,
.row-emoji {
  width: 22px;
  flex: 0 0 22px;
  text-align: center;
}

/* ================= GRILLA GENERAL COMPACTA ================= */

.schedule-list {
  display: grid;
  gap: 10px;
}

.schedule-block {
  border: 1px solid var(--line);
  border-radius: 14px;
  overflow: hidden;
  background: white;
}

.schedule-block.is-now {
  background: var(--green-soft);
  border-color: var(--green-dark);
}

.block-title {
  background: var(--green-soft-2);
  padding: 7px 10px;
  font-size: .88rem;
  line-height: 1.15;
}

.block-title-label {
  font-weight: 400;
  color: var(--muted);
}

.block-title-time {
  font-weight: 800;
  color: var(--text);
}

.block-body {
  padding: 10px;
  display: grid;
  gap: 8px;
}

.test-row {
  display: grid;
  gap: 2px;
}

.test-main {
  display: flex;
  align-items: baseline;
  gap: 6px;
  line-height: 1.15;
}

.role-label {
  font-size: .74rem;
  text-transform: uppercase;
  letter-spacing: .04em;
  font-weight: 400;
  color: var(--muted);
  white-space: nowrap;
}

.test-team {
  font-weight: 800;
  font-size: 1rem;
}

.test-topic {
  color: var(--muted);
  font-size: .82rem;
  line-height: 1.18;
  padding-left: calc(22px + 6px + 54px);
}

.feedback-compact-list {
  display: grid;
  gap: 4px;
  margin-top: 2px;
}

.feedback-row {
  display: flex;
  align-items: baseline;
  gap: 6px;
  font-size: .9rem;
  line-height: 1.2;
}

.feedback-row .team-main {
  font-weight: 700;
}

.schedule-block .is-selected-inline {
  background: var(--green-selected);
  border-radius: 8px;
  padding: 3px 5px;
  margin-left: -5px;
  outline: 1px solid rgba(27, 94, 32, .22);
}

/* ================= MI EQUIPO ================= */

.my-agenda {
  display: grid;
  gap: 10px;
}

.agenda-item {
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 12px;
  background: white;
}

.agenda-item.now {
  background: var(--green-soft);
  border-color: var(--green-dark);
}

.agenda-main {
  font-weight: 800;
  font-size: 1rem;
}

.breaks {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.break-pill {
  display: inline-flex;
  border-radius: 999px;
  background: white;
  border: 1px solid var(--line);
  padding: 7px 11px;
  font-weight: 700;
}

/* ================= TEXTOS / ACLARACIONES ================= */

.notice {
  background: #eaf4e5;
  border: 1px solid rgba(27,94,32,.20);
  border-radius: 14px;
  padding: 12px;
  font-weight: 700;
}

.texts {
  display: grid;
  gap: 8px;
}

.text-item {
  background: white;
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 12px;
  line-height: 1.35;
}

.text-item a {
  color: var(--green-dark);
  font-weight: 800;
  text-decoration: underline;
  text-underline-offset: 3px;
}

.text-item strong {
  font-weight: 850;
}

.text-item em {
  font-style: italic;
}

/* ================= TABLAS VIEJAS / FALLBACK ================= */

.table-wrap {
  overflow-x: auto;
  border-radius: 14px;
  border: 1px solid var(--line);
  background: white;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 560px;
}

th,
td {
  padding: 10px;
  border-bottom: 1px solid var(--line);
  text-align: left;
  vertical-align: top;
  font-size: .92rem;
}

th {
  background: var(--green-soft-2);
  font-size: .78rem;
  text-transform: uppercase;
  letter-spacing: .04em;
}

tr:last-child td {
  border-bottom: 0;
}

tr.is-now {
  background: var(--green-soft);
}

td.is-selected {
  background: var(--green-selected);
  font-weight: 800;
}

/* ================= FOOTER ================= */

.site-footer {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 1200;
}

.site-footer .footer-inner {
  display: grid;
  grid-template-columns: 3fr 1fr;
  align-items: stretch;
  width: 100%;
  border-top: 1px solid rgba(255,255,255,.28);
  overflow: hidden;
}

.site-footer .footer-left {
  font-family: var(--ff-kreon);
  background: var(--black);
  color: #f2f2f2;
  min-height: var(--footer-h);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 12px 4px 24px;
}

.footer-name {
  font-weight: 700;
  letter-spacing: .2px;
  font-size: .9rem;
}

.slink,
.slink:visited {
  color: #fff;
  text-decoration: none;
}

.slink {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 29px;
  height: 29px;
  border-radius: 8px;
  margin-left: 2px;
  transition: color .2s, background-color .2s, transform .06s;
}

.slink i {
  font-size: 18px;
  line-height: 1;
}

.slink:hover {
  background: rgba(255,255,255,.14);
}

.slink:active {
  transform: scale(.96);
}

.slink:focus-visible {
  outline: 2px solid rgba(255,255,255,.85);
  outline-offset: 3px;
}

.site-footer a.footer-right {
  background: #436d45;
  color: #fff;
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  min-height: var(--footer-h);
}

.site-footer a.footer-right i.ti {
  font-size: 20px;
  line-height: 1;
  display: inline-block;
}

.footer-domain {
  font-size: .82rem;
  letter-spacing: .2px;
}

.site-footer a.footer-right:hover .footer-domain {
  text-decoration: underline;
}

/* ================= RESPONSIVE ================= */

@media (min-width: 760px) {
  .status-grid,
  .tables {
    grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
  }

  .button-row {
    grid-template-columns: 1fr 1fr 1fr;
  }
}

@media (max-width: 767px) {
  :root {
    --footer-h: 36px;
  }

  .site-footer .footer-inner {
    grid-template-columns: 1fr 3fr;
  }

  .footer-name {
    display: none;
  }

  .site-footer .footer-left {
    justify-content: flex-start;
    gap: 5px;
    padding: 3px 8px;
    min-height: var(--footer-h);
  }

  .site-footer a.footer-right {
    justify-content: center;
    padding: 3px 8px;
    min-height: var(--footer-h);
  }

  .slink {
    width: 27px;
    height: 27px;
    margin-left: 1px;
  }

  .slink i {
    font-size: 17px;
  }

  .footer-domain {
    font-size: .78rem;
  }
}

@media (max-width: 640px) {
  main {
    padding-top: 12px;
  }

  .card {
    padding: 12px;
  }

  section {
    margin: 14px 0;
  }

  h2 {
    font-size: 1.22rem;
    margin-bottom: 8px;
  }

  h3 {
    margin-bottom: 8px;
  }

  .section-title-row {
    margin-top: 24px;
  }

  .site-header .meta {
    font-size: .82rem;
  }

  .status-card .eyebrow {
    font-size: .92rem;
  }

  .now-testing-line {
    flex-wrap: wrap;
  }

  .test-topic {
    padding-left: calc(22px + 6px + 50px);
  }
}

@media (prefers-reduced-motion: reduce) {
  * {
    transition: none !important;
  }
}

  </style>
</head>

<body>
<header class="site-header header-sticky">
  <div class="wrap header-wrap">
    <div class="header-top">
      <div class="header-main">
        <div class="title" id="site-title">Testeos UX</div>
        <div class="meta" id="site-subtitle">Cargando información...</div>
      </div>

      <div class="brand">
        <span class="pill">Testeo UX</span>
      </div>
    </div>
  </div>
</header>

  <main>
    <section class="card selector-card">
      <label for="team-select">Soy del equipo...</label>
      <select id="team-select">
        <option value="">Elegir equipo</option>
      </select>

      <div class="button-row">
        <button class="button-primary" id="share-button" type="button">Compartir mi link</button>
        <a class="button" id="feedback-link" href="#" target="_blank" rel="noopener">Hacer feedback</a>
        <a class="button" id="extra-link" href="#" target="_blank" rel="noopener">Link adicional</a>
      </div>
    </section>

<section>
<h2 class="section-title-row">
  <span>
    Qué está pasando ahora
    <span class="section-title-clock">🕒 <span id="current-clock-title">--:--</span> hs.</span>
  </span>
</h2>
  <div id="current-status" class="status-grid"></div>
</section>

    <section id="my-section" style="display:none;">
      <h2>Mi equipo</h2>
      <div id="my-now" class="card"></div>

      <div style="height:12px"></div>

      <div class="card">
        <h3>Mis bloques de actividad</h3>
        <div id="my-agenda" class="my-agenda"></div>
      </div>

      <div style="height:12px"></div>

      <div class="card">
        <h3>Mis breaks</h3>
        <div id="my-breaks" class="breaks"></div>
      </div>
    </section>

    <section>
      <h2>Grilla general</h2>
      <div id="tables" class="tables"></div>
    </section>

    <section>
      <h2>Aclaraciones</h2>
      <div id="texts" class="texts"></div>
    </section>
  </main>

  <footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-left">
      <span class="footer-name">Alvaro G. Ghisolfo</span>

      <a class="slink" href="https://instagram.com/ghisolfo.digital" target="_blank" rel="noopener" aria-label="Instagram">
        <i class="ti ti-brand-instagram"></i>
      </a>

      <a class="slink" href="https://discord.gg/sxXRJxqCMV" target="_blank" rel="noopener" aria-label="Discord">
        <i class="ti ti-brand-discord"></i>
      </a>

      <a class="slink" href="https://ghisolfo.digital" target="_blank" rel="noopener" aria-label="Sitio web">
        <i class="ti ti-world"></i>
      </a>
    </div>

    <a class="footer-right" href="https://instagram.com/ghisolfo.digital" target="_blank" rel="noopener" aria-label="Instagram: @ghisolfo.digital">
      <i class="ti ti-brand-instagram"></i>
      <span class="footer-domain">ghisolfo.digital</span>
    </a>
  </div>
</footer>

  <script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQb2Ggbd5Y1VOwTbAI7CjvaHNDwyYs5Y5IuJQCtR2G1eF7pN_bECM4_EQKMPvmwUredXZ2vMmZ43uiu/pub?gid=331164853&single=true&output=csv';

const BACKUP_CSV_URL = './data-backup.csv';
const CSV_REFRESH_MS = 120000;
const CSV_REFRESH_JITTER_MS = 30000;
const CSV_FIRST_LIVE_JITTER_MS = 25000;
const LOCAL_CACHE_KEY = 'testeosUX_csv_cache_v1';

    const app = {
      config: {},
      teams: new Map(),
      agenda: [],
      texts: [],
      links: {},
      selectedTeam: null,
      allBlocks: [],
      aulaOrder: []
    };

    init();

async function init() {
  const params = new URLSearchParams(window.location.search);
  app.selectedTeam = params.get('e') || '';

  try {
    const initialCsv = await loadInitialCsv();
    applyCsvText(initialCsv);
    renderAll();

    setInterval(renderAll, 30000);

    setTimeout(() => {
      refreshDataFromCsv();
      scheduleCsvRefresh();
    }, randomBetween(3000, CSV_FIRST_LIVE_JITTER_MS));

  } catch (err) {
    document.querySelector('main').innerHTML = `
      <section class="notice">
        No se pudo cargar ni el CSV de Google Sheets ni el backup local. Revisá que el CSV esté publicado y que exista data-backup.csv.
      </section>
    `;
    console.error(err);
  }
}


async function loadInitialCsv() {
  const cached = getCachedCsv();

  if (cached) {
    return cached;
  }

  try {
    return await fetchBackupCsv();
  } catch (backupErr) {
    console.warn('No se pudo cargar backup local, intento Google Sheets', backupErr);
    return await fetchCsv();
  }
}

function applyCsvText(csvText) {
  resetData();
  const rows = parseCSV(csvText);
  parseData(rows);
}

function resetData() {
  app.config = {};
  app.teams = new Map();
  app.agenda = [];
  app.texts = [];
  app.links = {};
  app.allBlocks = [];
  app.aulaOrder = [];
}

async function refreshDataFromCsv() {
  try {
    const csvText = await fetchCsv();
    saveCachedCsv(csvText);
    applyCsvText(csvText);
    renderAll();
  } catch (err) {
    console.warn('No se pudo actualizar desde Google Sheets. Se mantiene la data actual.', err);
  }
}

function scheduleCsvRefresh() {
  const delay = CSV_REFRESH_MS + randomBetween(0, CSV_REFRESH_JITTER_MS);

  setTimeout(async () => {
    await refreshDataFromCsv();
    scheduleCsvRefresh();
  }, delay);
}

async function fetchBackupCsv() {
  const res = await fetch(BACKUP_CSV_URL + '?cache=' + Date.now());
  if (!res.ok) throw new Error('Error cargando backup CSV');
  return await res.text();
}

function saveCachedCsv(csvText) {
  try {
    localStorage.setItem(LOCAL_CACHE_KEY, JSON.stringify({
      timestamp: Date.now(),
      csvText
    }));
  } catch (err) {
    console.warn('No se pudo guardar caché local', err);
  }
}

function getCachedCsv() {
  try {
    const raw = localStorage.getItem(LOCAL_CACHE_KEY);
    if (!raw) return null;

    const data = JSON.parse(raw);
    if (!data.csvText) return null;

    return data.csvText;
  } catch (err) {
    return null;
  }
}

function randomBetween(min, max) {
  return Math.floor(min + Math.random() * (max - min));
}
    async function fetchCsv() {
      const url = CSV_URL + (CSV_URL.includes('?') ? '&' : '?') + 'cache=' + Date.now();
      const res = await fetch(url);
      if (!res.ok) throw new Error('Error cargando CSV');
      return await res.text();
    }

    function parseData(rows) {
      rows.shift();

      rows.forEach(row => {
        const tipo = cell(row, 0).trim().toLowerCase();
        const fila = cell(row, 1).trim().toLowerCase();

        if (fila !== 'data') return;

        const a = cell(row, 2);
        const b = cell(row, 3);
        const c = cell(row, 4);
        const d = cell(row, 5);
        const e = cell(row, 6);

        if (tipo === 'config') {
          app.config[a] = b;
        }

        if (tipo === 'equipos') {
          app.teams.set(a, {
            id: a,
            nombre: b,
            tematica: c
          });
        }

if (tipo === 'agenda') {
  // Formato nuevo recomendado:
  // agenda | data | hora_inicio | hora_cierre | aula | testea | feedback_1 | feedback_2 | ...
  // También mantiene compatibilidad con el formato anterior:
  // agenda | data | hora | aula | testea | feedback_1 | feedback_2 | ...
  const usaFormatoNuevo = isTimeLike(b);

  const horaInicio = a;
  const horaCierre = usaFormatoNuevo ? b : '';
  const aula = usaFormatoNuevo ? c : b;
  const testea = usaFormatoNuevo ? d : c;

  const feedbacks = row
    .slice(usaFormatoNuevo ? 6 : 5)
    .map(value => String(value || '').trim())
    .filter(value => value !== '');

  if (aula && !app.aulaOrder.includes(aula)) {
    app.aulaOrder.push(aula);
  }

  app.agenda.push({
    horaInicio,
    horaCierre,
    aula,
    testea,
    feedbacks
  });
}

        if (tipo === 'texto') {
          app.texts.push({
            orden: Number(a) || 999,
            texto: b
          });
        }

        if (tipo === 'links') {
          app.links[a] = {
            label: b,
            url: c
          };
        }
      });

      inferMissingEndTimes();

      app.agenda.sort((x, y) => {
        const byTime = timeToMin(x.horaInicio) - timeToMin(y.horaInicio);
        if (byTime !== 0) return byTime;

        return app.aulaOrder.indexOf(x.aula) - app.aulaOrder.indexOf(y.aula);
      });

      app.texts.sort((x, y) => x.orden - y.orden);
      app.allBlocks = uniqueBlocks(app.agenda);
    }

function renderAll() {
  renderHeader();
  renderSelector();
  renderLinks();
  renderClockTitle();
  renderCurrentStatus();
  renderTables();
  renderMySection();
  renderTexts();
  renderFooter();
}

function renderClockTitle() {
  const el = document.getElementById('current-clock-title');
  if (el) el.textContent = currentClockLabel();
}

    function renderHeader() {
      document.title = app.config.titulo || 'Testeos UX';
      document.getElementById('site-title').textContent = app.config.titulo || 'Testeos UX';
      document.getElementById('site-subtitle').textContent = app.config.bajada || '';
    }

    function renderSelector() {
      const select = document.getElementById('team-select');

      if (select.options.length <= 1) {
        for (const [id, data] of app.teams.entries()) {
          const opt = document.createElement('option');
          opt.value = id;
          opt.textContent = `${id} · ${data.nombre}`;
          select.appendChild(opt);
        }
      }

      select.value = app.selectedTeam || '';

      select.onchange = () => {
        app.selectedTeam = select.value;
        const url = new URL(window.location.href);

        if (app.selectedTeam) {
          url.searchParams.set('e', app.selectedTeam);
        } else {
          url.searchParams.delete('e');
        }

        history.pushState({}, '', url);
        renderAll();
      };

      window.onpopstate = () => {
        const params = new URLSearchParams(window.location.search);
        app.selectedTeam = params.get('e') || '';
        renderAll();
      };
    }

    function renderLinks() {
      setLink('feedback-link', app.links.feedback, 'Hacer feedback');
      setLink('extra-link', app.links.extra, 'Link adicional');

      document.getElementById('share-button').onclick = async () => {
        const url = window.location.href;
        const title = app.selectedTeam
          ? `Agenda del equipo ${app.selectedTeam} · ${teamName(app.selectedTeam)}`
          : app.config.titulo || 'Testeos UX';

        try {
          if (navigator.share) {
            await navigator.share({ title, url });
          } else {
            await navigator.clipboard.writeText(url);
            alert('Link copiado');
          }
        } catch (err) {
          console.warn(err);
        }
      };
    }

    function setLink(id, data, fallbackLabel) {
      const el = document.getElementById(id);
      el.textContent = data?.label || fallbackLabel;

      if (data?.url) {
        el.href = data.url;
        el.style.opacity = '1';
        el.style.pointerEvents = 'auto';
      } else {
        el.href = '#';
        el.style.opacity = '.45';
        el.style.pointerEvents = 'none';
      }
    }

function renderCurrentStatus() {
  const box = document.getElementById('current-status');
  const nowRows = currentRows();

  if (!nowRows.length) {
    box.innerHTML = `
      <div class="card">
<div class="eyebrow">Ahora</div>
        <div class="big">No hay un bloque activo</div>
        <div class="sub">Puede ser antes del primer turno o después del último.</div>
      </div>
    `;
    return;
  }

  box.innerHTML = nowRows.map(row => {
    const selectedIsHere = teamInRow(app.selectedTeam, row);

    return `
      <div class="card status-card ${selectedIsHere ? 'current-for-team' : ''}">
<div class="eyebrow">Aula <span class="aula-code">${escapeHTML(row.aula)}</span> · ${blockLabelHTML(row)}</div>

        <div class="now-testing-line team-label-large">
          <span aria-hidden="true">📱</span>
          <span class="now-testing-label">Está testeando</span>
          <span class="now-testing-team">${teamLabel(row.testea, true)}</span>
        </div>

        <div class="sub">Deberían estar dando feedback:</div>

        <div class="feedback-list">
          ${row.feedbacks.map(id => `
            <span class="pill ${isSelectedTeam(id) ? 'selected' : ''}">
              <span class="feedback-pill-row">
                <span class="feedback-emoji" aria-hidden="true">👈</span>
                <span>${teamLabel(id, false)}</span>
              </span>
            </span>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');
}
function renderTables() {
  const box = document.getElementById('tables');
  const aulas = app.aulaOrder.length
    ? app.aulaOrder
    : [...new Set(app.agenda.map(x => x.aula).filter(Boolean))];

  box.innerHTML = aulas.map(aula => {
    const rows = app.agenda.filter(item => item.aula === aula);

    return `
      <div class="card">
        <h3>Aula <span class="aula-code">${escapeHTML(aula)}</span></h3>
        <div class="schedule-list">
          ${rows.map(row => renderScheduleBlock(row)).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function renderScheduleBlock(row) {
  const isNow = isRowNow(row);

  return `
    <div class="schedule-block ${isNow ? 'is-now' : ''}">
      <div class="block-title">
        <span class="block-title-label">Bloque</span>
        <span aria-hidden="true">🕒</span>
        <span class="block-title-time">${blockLabelHTML(row)}</span>
      </div>

      <div class="block-body">
        <div class="test-row ${isSelectedTeam(row.testea) ? 'is-selected-inline' : ''}">
          <div class="test-main">
            <span class="row-emoji" aria-hidden="true">📱</span>
            <span class="role-label">Testea</span>
            <span class="test-team">${escapeHTML(teamNumberAndName(row.testea))}</span>
          </div>
          ${teamTopic(row.testea) ? `<div class="test-topic">${escapeHTML(teamTopic(row.testea))}</div>` : ''}
        </div>

        <div class="feedback-compact-list">
          ${row.feedbacks.map(id => `
            <div class="feedback-row ${isSelectedTeam(id) ? 'is-selected-inline' : ''}">
              <span class="row-emoji" aria-hidden="true">👈</span>
              <span class="role-label">Da feedback</span>
              <span>${teamLabel(id, false)}</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
}

    function renderMySection() {
      const section = document.getElementById('my-section');

      if (!app.selectedTeam) {
        section.style.display = 'none';
        return;
      }

      section.style.display = 'block';

      const actions = myActions(app.selectedTeam);
      const nowAction = currentActionForTeam(app.selectedTeam);
      const nextAction = nextActionForTeam(app.selectedTeam);

      document.getElementById('my-now').innerHTML = renderMyNow(nowAction, nextAction);
      document.getElementById('my-agenda').innerHTML = actions.map(action => renderAction(action)).join('');

      const breakBlocks = app.allBlocks.filter(block => {
        return !actions.some(action =>
          action.horaInicio === block.horaInicio &&
          action.horaCierre === block.horaCierre
        );
      });

      document.getElementById('my-breaks').innerHTML = breakBlocks
        .map(block => `<span class="break-pill">${escapeHTML(blockLabel(block))}</span>`)
        .join('');
    }

    function renderMyNow(nowAction, nextAction) {
      const myTeam = teamLabel(app.selectedTeam);

      if (nowAction) {
        return `
          <div class="eyebrow">Ahora · ${myTeam}</div>
          <div class="big">Aula ${escapeHTML(nowAction.aula)} · ${escapeHTML(nowAction.rol)}</div>
          <div class="sub">${escapeHTML(blockLabel(nowAction))} · ${escapeHTML(nowAction.detalle)}</div>
        `;
      }

      if (nextAction) {
        return `
          <div class="eyebrow">Ahora tenés break · ${myTeam}</div>
          <div class="big">Próximo bloque: ${escapeHTML(blockLabel(nextAction))} · Aula ${escapeHTML(nextAction.aula)}</div>
          <div class="sub">${escapeHTML(nextAction.rol)} · ${escapeHTML(nextAction.detalle)}</div>
        `;
      }

      return `
        <div class="eyebrow">${myTeam}</div>
        <div class="big">Ya no tenés más bloques pendientes</div>
      `;
    }

    function renderAction(action) {
      const now = isActionNow(action);

      return `
        <div class="agenda-item ${now ? 'now' : ''}">
          <div class="agenda-main">${escapeHTML(blockLabel(action))} · Aula ${escapeHTML(action.aula)}</div>
          <div>${escapeHTML(action.rol)}</div>
          <div class="sub">${escapeHTML(action.detalle)}</div>
        </div>
      `;
    }

function renderTexts() {
  const box = document.getElementById('texts');

  if (!app.texts.length) {
    box.innerHTML = `<div class="text-item">No hay aclaraciones cargadas.</div>`;
    return;
  }

  box.innerHTML = app.texts.map(item => `
    <div class="text-item">${formatText(item.texto)}</div>
  `).join('');
}
function renderFooter() {
  // Footer visual fijo. El texto editable del CSV lo usamos como title si existe.
  const footer = document.querySelector('.site-footer');
  if (footer && app.config.footer) {
    footer.setAttribute('title', app.config.footer);
  }
}

function myActions(teamId) {
  const actions = [];

  app.agenda.forEach(row => {
    if (row.testea === teamId) {
      actions.push({
        horaInicio: row.horaInicio,
        horaCierre: row.horaCierre,
        aula: row.aula,
        rol: 'Testeás',
        detalle: 'Tu equipo presenta su producto'
      });
    }

    if (row.feedbacks.includes(teamId)) {
      actions.push({
        horaInicio: row.horaInicio,
        horaCierre: row.horaCierre,
        aula: row.aula,
        rol: 'Das feedback',
        detalle: `A ${plainTeamLabel(row.testea)}`
      });
    }
  });

  return actions.sort((a, b) => timeToMin(a.horaInicio) - timeToMin(b.horaInicio));
}
    function currentActionForTeam(teamId) {
      return myActions(teamId).find(action => isActionNow(action)) || null;
    }

    function nextActionForTeam(teamId) {
      const nowMin = currentMinutes();

      return myActions(teamId).find(action =>
        timeToMin(action.horaInicio) > nowMin
      ) || null;
    }

    function currentRows() {
      return app.agenda
        .filter(row => isRowNow(row))
        .sort((a, b) => app.aulaOrder.indexOf(a.aula) - app.aulaOrder.indexOf(b.aula));
    }

    function isRowNow(row) {
      const now = currentMinutes();
      return now >= timeToMin(row.horaInicio) && now < timeToMin(row.horaCierre);
    }

    function isActionNow(action) {
      const now = currentMinutes();
      return now >= timeToMin(action.horaInicio) && now < timeToMin(action.horaCierre);
    }

    function currentMinutes() {
      const forced = new URLSearchParams(window.location.search).get('t');

      if (forced && /^\d{1,2}:\d{2}$/.test(forced)) {
        return timeToMin(forced);
      }

      const d = new Date();
      return d.getHours() * 60 + d.getMinutes();
    }

    function timeToMin(time) {
      const [h, m] = String(time || '0:00').split(':').map(Number);
      return h * 60 + m;
    }

    function isTimeLike(value) {
      return /^\d{1,2}:\d{2}$/.test(String(value || '').trim());
    }

function blockLabel(item) {
  return `${item.horaInicio} a ${item.horaCierre} hs.`;
}

function blockLabelHTML(item) {
  return `
    <span class="block-hour">${escapeHTML(item.horaInicio)}</span>
    <span class="block-lower">a</span>
    <span class="block-hour">${escapeHTML(item.horaCierre)}</span>
    <span class="block-lower">hs.</span>
  `;
}

    function uniqueBlocks(agenda) {
      const blocks = [];

      agenda.forEach(row => {
        const exists = blocks.some(block =>
          block.horaInicio === row.horaInicio &&
          block.horaCierre === row.horaCierre
        );

        if (!exists) {
          blocks.push({
            horaInicio: row.horaInicio,
            horaCierre: row.horaCierre
          });
        }
      });

      return blocks.sort((a, b) => timeToMin(a.horaInicio) - timeToMin(b.horaInicio));
    }

    function inferMissingEndTimes() {
      const starts = [...new Set(app.agenda.map(row => row.horaInicio))]
        .sort((a, b) => timeToMin(a) - timeToMin(b));

      app.agenda.forEach(row => {
        if (row.horaCierre) return;

        const currentIndex = starts.indexOf(row.horaInicio);
        const nextStart = starts[currentIndex + 1];

        if (nextStart) {
          row.horaCierre = nextStart;
        } else {
          row.horaCierre = minToTime(timeToMin(row.horaInicio) + 35);
        }
      });
    }

    function minToTime(totalMinutes) {
      const h = Math.floor(totalMinutes / 60);
      const m = totalMinutes % 60;
      return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
    }

function teamData(id) {
  return app.teams.get(String(id)) || {
    id,
    nombre: `Equipo ${id}`,
    tematica: ''
  };
}


function teamNumberAndName(id) {
  if (!id) return '';
  const data = teamData(id);
  return `${id} · ${data.nombre}`;
}

function teamTopic(id) {
  if (!id) return '';
  return teamData(id).tematica || '';
}

    function teamName(id) {
      return teamData(id).nombre;
    }

    function plainTeamLabel(id) {
      const data = teamData(id);
      return `${id} · ${data.nombre}`;
    }

    function teamLabel(id, showTopic = true) {
      if (!id) return '';

      const data = teamData(id);
      const topic = showTopic && data.tematica
        ? `<span class="team-topic">${escapeHTML(data.tematica)}</span>`
        : '';

      return `
        <span class="team-label">
          <span class="team-main">${escapeHTML(id)} · ${escapeHTML(data.nombre)}</span>
          ${topic}
        </span>
      `;
    }


function teamInRow(teamId, row) {
  if (!teamId) return false;
  return row.testea === teamId || row.feedbacks.includes(teamId);
}

function isSelectedTeam(id) {
  return Boolean(app.selectedTeam && id && id === app.selectedTeam);
}

    function cell(row, index) {
      return row[index] ? String(row[index]).trim() : '';
    }

    function currentClockLabel() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
}

function formatText(text) {
  let html = escapeHTML(text);

  html = html.replace(
    /\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
    '<a href="$2" target="_blank" rel="noopener">$1</a>'
  );

  html = html.replace(
    /(^|[\s>])(https?:\/\/[^\s<]+)/g,
    '$1<a href="$2" target="_blank" rel="noopener">$2</a>'
  );

  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/__([^_]+)__/g, '<em>$1</em>');

  return html;
}

    function escapeHTML(str) {
      return String(str || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }
    

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = '';
      let insideQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"' && insideQuotes && next === '"') {
          cell += '"';
          i++;
          continue;
        }

        if (char === '"') {
          insideQuotes = !insideQuotes;
          continue;
        }

        if (char === ',' && !insideQuotes) {
          row.push(cell);
          cell = '';
          continue;
        }

        if ((char === '\n' || char === '\r') && !insideQuotes) {
          if (char === '\r' && next === '\n') i++;
          row.push(cell);
          rows.push(row);
          row = [];
          cell = '';
          continue;
        }

        cell += char;
      }

      if (cell.length || row.length) {
        row.push(cell);
        rows.push(row);
      }

      return rows.filter(r => r.some(c => String(c).trim() !== ''));
    }
