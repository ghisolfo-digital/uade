<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Testeos UX</title>

  <link rel="icon" href="/uade/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/uade/favicon.png" type="image/png">
  <link rel="shortcut icon" href="/uade/favicon.ico">

  <link rel="stylesheet" href="estilos.css?v=001">
  <script src="app.js?v=001" defer></script>
</head>

<body>
  <header class="site-header header-sticky">
    <div class="wrap header-wrap">
      <div class="header-top">
        <div class="header-main">
          <div class="title" id="site-title">Testeos UX</div>
          <div class="meta">Testeo de productos UX</div>
        </div>

<div class="header-actions">
  <button class="header-icon-btn" id="share-button" type="button" aria-label="Compartir link">
    <i class="ti ti-share-3"></i>
  </button>

  <a class="header-feedback-btn" id="feedback-link" href="#" target="_blank" rel="noopener">
    Dar feedback a otro equipo
  </a>
</div>
      </div>

      <div id="selected-team-bar" class="selected-team-bar" hidden>
  <div class="selected-team-inner">
    <span class="selected-team-prefix">Estás viendo</span>

    <button id="clear-team-button" class="selected-team-pill" type="button" aria-label="Ver todos los equipos">
      <span id="selected-team-text">Equipo seleccionado</span>
      <i class="ti ti-x"></i>
    </button>
  </div>
</div>

    </div>
  </header>


<div class="intro-wrap">
  <p id="site-subtitle">Cargando información...</p>
</div>
  <main>
    <section class="card selector-card">
      <label for="team-select">Soy del equipo...</label>
      <select id="team-select">
        <option value="">Elegir equipo</option>
      </select>

    </section>

    <section>
      <h2 class="section-title-row section-band">
        <span>
          Qué está pasando ahora
          <span class="section-title-clock">🕒 <span id="current-clock-title">--:--</span> hs.</span>
        </span>
      </h2>
      <div id="current-status" class="status-grid"></div>
    </section>

    <section id="my-section" style="display:none;">
      <h2 class="section-band" id="my-team-title">Mi equipo</h2>
      <div id="my-now" class="card"></div>

      <div style="height:12px"></div>

      <div class="card">
        <h3>💼 Así se organiza mi clase de hoy</h3>
        <div id="my-agenda" class="my-agenda"></div>
      </div>


    </section>

    <section>
      <h2 class="section-band">Grilla general</h2>
      <div id="tables" class="tables"></div>
    </section>

    <section>
      <h2 class="section-band">Aclaraciones</h2>
      <div id="texts" class="texts"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-left">
        <span class="footer-name">Alvaro G. Ghisolfo</span>

        <a class="slink" href="https://instagram.com/ghisolfo.digital" target="_blank" rel="noopener" aria-label="Instagram">
          <i class="ti ti-brand-instagram"></i>
        </a>

        <a class="slink" href="https://discord.gg/sxXRJxqCMV" target="_blank" rel="noopener" aria-label="Discord">
          <i class="ti ti-brand-discord"></i>
        </a>

        <a class="slink" href="https://ghisolfo.digital" target="_blank" rel="noopener" aria-label="Sitio web">
          <i class="ti ti-world"></i>
        </a>
      </div>

      <a class="footer-right" href="https://instagram.com/ghisolfo.digital" target="_blank" rel="noopener" aria-label="Instagram: @ghisolfo.digital">
        <i class="ti ti-brand-instagram"></i>
        <span class="footer-domain">ghisolfo.digital</span>
      </a>
    </div>
  </footer>
</body>
</html>
